<div class="relative" *ngIf="currentUser$ | async as user">
  <div class="flex items-center space-x-3">
    <!-- User Avatar -->
    <div class="flex-shrink-0">
      <div class="h-8 w-8 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center shadow-lg">
        <span class="text-sm font-medium text-white">
          {{ user.firstName?.charAt(0) || user.displayName.charAt(0) || 'U' }}
        </span>
      </div>
    </div>
    
    <!-- User Info -->
    <div class="flex-1 min-w-0">
      <p class="text-sm font-medium text-gray-900 dark:text-white truncate">
        {{ user.displayName }}
      </p>
      <p class="text-xs text-gray-500 dark:text-gray-400 truncate">
        {{ user.email }}
      </p>
    </div>
    
    <!-- Logout Button -->
    <div class="flex-shrink-0">
      <button
        (click)="onLogout()"
        class="inline-flex items-center px-3 py-2 border border-transparent text-sm leading-4 font-medium rounded-lg text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors duration-200"
        title="Sign out"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
        </svg>
      </button>
    </div>
  </div>
</div>
