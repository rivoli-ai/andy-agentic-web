<div class="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100 dark:from-gray-900 dark:to-gray-800 flex items-center justify-center px-4">
  <div class="max-w-md w-full text-center">
    <!-- Maintenance Icon -->
    <div class="mb-8">
      <div class="mx-auto w-24 h-24 bg-orange-100 dark:bg-orange-900/30 rounded-full flex items-center justify-center">
        <svg class="w-12 h-12 text-orange-600 dark:text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
        </svg>
      </div>
    </div>

    <!-- Title -->
    <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-4">
      Service Temporarily Unavailable
    </h1>

    <!-- Description -->
    <p class="text-lg text-gray-600 dark:text-gray-300 mb-8">
      We're currently performing maintenance on our servers. Please check back in a few minutes.
    </p>

    <!-- Status Information -->
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-6 mb-8">
      <div class="flex items-center justify-center mb-4">
        <div class="w-3 h-3 bg-red-500 rounded-full animate-pulse mr-3"></div>
        <span class="text-sm font-medium text-gray-700 dark:text-gray-300">API Status: Offline</span>
      </div>
      
     
    </div>

    <!-- Actions -->
    <div class="space-y-4">
      <button
        (click)="retryConnection()"
        [disabled]="isRetrying"
        class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-medium py-3 px-6 rounded-lg transition-colors duration-200 flex items-center justify-center"
      >
        <svg *ngIf="isRetrying" class="w-5 h-5 mr-2 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        {{ isRetrying ? 'Retrying...' : 'Try Again' }}
      </button>

      <button
        (click)="goToLogin()"
        class="w-full bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 font-medium py-3 px-6 rounded-lg transition-colors duration-200"
      >
        Back to Login
      </button>
    </div>

    <!-- Footer -->
    <div class="mt-8 text-sm text-gray-500 dark:text-gray-400">
      <p>If this issue persists, please contact support.</p>
    </div>
  </div>
</div>
