<div
  class="toast-stack pointer-events-none fixed inset-x-0 z-[var(--z-toast)] flex flex-col items-center gap-2 px-4"
>
  <div
    *ngFor="let notification of notifications"
    [class]="getNotificationClasses(notification.type)"
    [@slideInOut]
  >
    <div class="toast-body flex items-start gap-3 p-4 pr-2">
      <div class="toast-icon-wrap flex h-9 w-9 flex-shrink-0 items-center justify-center rounded-xl">
        <svg *ngIf="notification.type === 'success'" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <svg *ngIf="notification.type === 'error'" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <svg *ngIf="notification.type === 'warning'" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"></path>
        </svg>
        <svg *ngIf="notification.type === 'info'" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
      </div>

      <div class="min-w-0 flex-1 pt-0.5">
        <h4 class="toast-title text-ink mb-0.5 text-sm font-semibold leading-snug tracking-tight">
          {{ notification.title }}
        </h4>
        <p class="toast-message text-ink-secondary text-sm leading-relaxed">
          {{ notification.message }}
        </p>
      </div>

      <button
        type="button"
        (click)="hideNotification(notification.id)"
        class="toast-dismiss text-ink-muted hover:text-ink -mr-1 flex-shrink-0 rounded-lg p-2 transition-colors duration-200 hover:bg-surface-hover"
        title="Fermer"
      >
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <div
      *ngIf="notification.options && notification.options.duration && notification.options.duration > 0"
      class="toast-progress-track bg-line-light/80 dark:bg-line-light/30 h-0.5 w-full"
    >
      <div
        class="toast-progress-fill h-full transition-all duration-100 ease-linear"
        [class]="getProgressBarClasses(notification.type)"
        [style.width.%]="getProgressPercentage(notification.id)"
      ></div>
    </div>
  </div>
</div>
